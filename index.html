<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklister</title>
  <style>
    :root {
      --bg: #1a1410;
      --bg-2: #231b16;
      --panel: #2d221c;
      --panel-2: #392b23;
      --border: #564236;
      --text: #f1e5d8;
      --muted: #c4ac96;
      --accent: #9d6a43;
      --accent-2: #b97c4d;
      --danger: #7b463a;
      --done: #33271f;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      --radius: 16px;
      --gap: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .topbar,
    .panel,
    .statusbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .controls,
    .checklist-bar,
    .settings-grid,
    .dialog-actions,
    .panel-header {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button,
    select,
    input[type="text"],
    input[type="password"] {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    input[type="text"],
    input[type="password"] {
      min-width: 0;
      width: 100%;
    }

    button {
      cursor: pointer;
    }

    button:hover,
    select:hover,
    input[type="text"]:hover,
    input[type="password"]:hover {
      border-color: #725645;
      background: #433229;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff6ef;
    }

    button.primary:hover {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    button.danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff3ef;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      gap: var(--gap);
      min-height: 0;
      flex: 1;
    }

    .sidebar,
    .main {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      min-height: 0;
    }

    .panel {
      overflow: hidden;
      min-height: 0;
    }

    .panel-header {
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 700;
    }

    .panel-note,
    .field-note,
    .muted,
    .status-text {
      color: var(--muted);
      font-size: 13px;
    }

    .checklist-list {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      max-height: 42vh;
    }

    .checklist-button {
      width: 100%;
      text-align: start;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .checklist-button.active {
      border-color: var(--accent-2);
      background: #463327;
    }

    .checklist-name {
      font-weight: 700;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .checklist-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .editor-panel.hidden {
      display: none;
    }

    .main-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr);
      gap: var(--gap);
      min-height: 0;
      flex: 1;
    }

    .main-stack.editor-hidden {
      grid-template-columns: 1fr;
    }

    .editor-wrap,
    .preview-wrap {
      padding: 10px;
      min-height: 0;
    }

    textarea {
      width: 100%;
      min-height: 58vh;
      height: 100%;
      resize: vertical;
      border: 0;
      outline: 0;
      border-radius: 12px;
      background: #241b16;
      color: var(--text);
      line-height: 1.6;
      padding: 16px;
    }

    textarea::placeholder {
      color: #b59b86;
    }

    .preview-wrap {
      overflow: auto;
    }

    .empty {
      padding: 20px 12px;
      color: var(--muted);
    }

    .item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-2);
      margin-bottom: 8px;
    }

    .item.done {
      background: var(--done);
    }

    .checkbox {
      width: 20px;
      height: 20px;
      accent-color: var(--accent-2);
      margin-top: 2px;
      cursor: pointer;
    }

    .item-text {
      font-size: 16px;
      line-height: 1.5;
      word-break: break-word;
      unicode-bidi: isolate;
      width: 100%;
      text-align: inherit;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #d7beaa;
    }

    .timestamp {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      align-self: center;
      text-align: inherit;
      unicode-bidi: isolate;
    }

    .timestamp-prefix,
    .timestamp-value {
      unicode-bidi: isolate;
    }

    .timestamp-value-ltr {
      direction: ltr;
      display: inline-block;
    }

    .statusbar {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .dialog-backdrop.show {
      display: flex;
    }

    .dialog {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .dialog-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: start;
    }

    .full {
      grid-column: 1 / -1;
    }

    .dialog-actions {
      justify-content: flex-end;
      padding: 0 16px 16px;
    }

    .hidden {
      display: none !important;
    }

    .align-right {
      text-align: right;
    }

    .align-left {
      text-align: left;
    }

    @media (max-width: 980px) {
      .layout,
      .main-stack,
      .main-stack.editor-hidden,
      .settings-grid {
        grid-template-columns: 1fr;
      }

      .checklist-list {
        max-height: none;
      }

      textarea {
        min-height: 38vh;
      }
    }

    @media (max-width: 560px) {
      .item {
        grid-template-columns: auto 1fr;
      }

      .timestamp {
        grid-column: 2;
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="title" id="appTitle"></div>
        <div class="subtitle" id="appSubtitle"></div>
      </div>
      <div class="controls">
        <button id="toggleEditorBtn"></button>
        <select id="appDirection" aria-label="Content direction mode"></select>
        <select id="uiLanguage" aria-label="Interface language">
          <option value="he">עברית</option>
          <option value="en">English</option>
        </select>
        <button id="openSettingsBtn"></button>
        <button id="saveBtn" class="primary"></button>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title" id="checklistsTitle"></div>
              <div class="panel-note" id="checklistsNote"></div>
            </div>
          </div>
          <div class="panel-header checklist-bar">
            <button id="newChecklistBtn" class="primary"></button>
            <button id="renameChecklistBtn"></button>
            <button id="deleteChecklistBtn" class="danger"></button>
          </div>
          <div class="checklist-list" id="checklistList"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title" id="actionsTitle"></div>
              <div class="panel-note" id="actionsNote"></div>
            </div>
          </div>
          <div class="panel-header checklist-bar">
            <button id="clearChecksBtn"></button>
            <button id="reloadBtn"></button>
          </div>
        </section>
      </aside>

      <main class="main">
        <div class="main-stack editor-hidden" id="mainStack">
          <section class="panel editor-panel hidden" id="editorPanel">
            <div class="panel-header">
              <div>
                <div class="panel-title" id="editorPanelTitle"></div>
                <div class="panel-note" id="editorPanelNote"></div>
              </div>
              <div class="muted" id="editorStats"></div>
            </div>
            <div class="editor-wrap">
              <textarea id="editor"></textarea>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <div>
                <div class="panel-title" id="previewTitle"></div>
                <div class="panel-note" id="previewPanelNote"></div>
              </div>
              <div class="muted" id="previewStats"></div>
            </div>
            <div class="preview-wrap" id="preview"></div>
          </section>
        </div>

        <div class="statusbar">
          <div class="status-text" id="statusText"></div>
          <div class="status-text" id="saveInfo"></div>
        </div>
      </main>
    </div>
  </div>

  <div class="dialog-backdrop" id="settingsDialog">
    <div class="dialog">
      <div class="panel-header">
        <div>
          <div class="panel-title" id="settingsTitle"></div>
          <div class="panel-note" id="settingsNote"></div>
        </div>
      </div>
      <div class="dialog-body">
        <div class="settings-grid">
          <div class="field">
            <label for="ownerInput" id="ownerLabel"></label>
            <input id="ownerInput" type="text" />
          </div>
          <div class="field">
            <label for="repoInput" id="repoLabel"></label>
            <input id="repoInput" type="text" />
          </div>
          <div class="field">
            <label for="branchInput" id="branchLabel"></label>
            <input id="branchInput" type="text" />
          </div>
          <div class="field">
            <label for="filePathInput" id="filePathLabel"></label>
            <input id="filePathInput" type="text" />
          </div>
          <div class="field full">
            <label for="tokenInput" id="tokenLabel"></label>
            <input id="tokenInput" type="password" />
            <div class="field-note" id="tokenNote"></div>
          </div>
        </div>
      </div>
      <div class="dialog-actions">
        <button id="closeSettingsBtn"></button>
        <button id="saveSettingsBtn" class="primary"></button>
      </div>
    </div>
  </div>

    const toggleEditorBtn = document.getElementById('toggleEditorBtn');
    const appDirection = document.getElementById('appDirection');
    const uiLanguage = document.getElementById('uiLanguage');
    const openSettingsBtn = document.getElementById('openSettingsBtn');
    const saveBtn = document.getElementById('saveBtn');
    const clearChecksBtn = document.getElementById('clearChecksBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const newChecklistBtn = document.getElementById('newChecklistBtn');
    const renameChecklistBtn = document.getElementById('renameChecklistBtn');
    const deleteChecklistBtn = document.getElementById('deleteChecklistBtn');

    const mainStack = document.getElementById('mainStack');
    const editorPanel = document.getElementById('editorPanel');
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const previewTitle = document.getElementById('previewTitle');
    const checklistList = document.getElementById('checklistList');
    const editorStats = document.getElementById('editorStats');
    const previewStats = document.getElementById('previewStats');
    const statusText = document.getElementById('statusText');
    const saveInfo = document.getElementById('saveInfo');

    const settingsDialog = document.getElementById('settingsDialog');
    const ownerInput = document.getElementById('ownerInput');
    const repoInput = document.getElementById('repoInput');
    const branchInput = document.getElementById('branchInput');
    const filePathInput = document.getElementById('filePathInput');
    const tokenInput = document.getElementById('tokenInput');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');

    let repoFileSha = null;

    let state = {
      direction: 'auto',
      showEditor: false,
      uiLanguage: 'he',
      selectedChecklistId: null,
      github: {
        owner: 'JonBiryon',
        repo: 'Checklister',
        branch: 'main',
        filePath: 'data/checklists.json',
        token: ''
      },
      data: {
        version: 1,
        lastSavedAt: null,
        checklists: []
      }
    };

    function t(key, vars = {}) {
      const lang = UI_TEXT[state.uiLanguage] || UI_TEXT.he;
      let value = lang[key] ?? UI_TEXT.he[key] ?? key;
      Object.keys(vars).forEach(name => {
        value = value.replaceAll(`{${name}}`, vars[name]);
      });
      return value;
    }

    function makeId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2);
    }

    function createChecklist(name, rawText) {
      const id = makeId();
      return {
        id,
        name,
        rawText,
        items: parseItems(rawText, []),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
    }

    function splitLines(rawText) {
      return rawText
        .replace(/\r\n/g, '\n')
        .split('\n')
        .map(line => line.trim())
        .filter(line => line !== '');
    }

    function parseItems(rawText, existingItems) {
      const lines = splitLines(rawText);
      const used = new Set();

      return lines.map(text => {
        const matchIndex = existingItems.findIndex((item, index) => !used.has(index) && item.text === text);

        if (matchIndex >= 0) {
          used.add(matchIndex);
          return {
            ...existingItems[matchIndex],
            text
          };
        }

        return {
          id: makeId(),
          text,
          done: false,
          updatedAt: null
        };
      });
    }

    function getSelectedChecklist() {
      return state.data.checklists.find(item => item.id === state.selectedChecklistId) || null;
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function formatTimestamp(value) {
      if (!value) {
        return t('neverUpdated');
      }

      try {
        return new Intl.DateTimeFormat(state.uiLanguage === 'he' ? 'he-IL' : 'en-US', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        }).format(new Date(value));
      } catch {
        return value;
      }
    }

    function getFirstStrongDirection(text) {
      for (const char of text || '') {
        if (/[A-Za-z]/.test(char)) {
          return 'ltr';
        }
        if (/[֐-ࣿ]/.test(char)) {
          return 'rtl';
        }
      }
      return state.uiLanguage === 'he' ? 'rtl' : 'ltr';
    }

    function getItemDirection(text) {
      return state.direction === 'auto' ? getFirstStrongDirection(text) : state.direction;
    }

    function applyDirection(element, mode) {
      element.dir = mode === 'rtl' || mode === 'ltr' ? mode : 'auto';
    }

    function applyTextDirection(element, text, fallback = 'auto') {
      const resolved = fallback === 'auto' ? getFirstStrongDirection(text) : fallback;
      element.dir = resolved;
      element.classList.toggle('align-right', resolved === 'rtl');
      element.classList.toggle('align-left', resolved === 'ltr');
      element.style.textAlign = resolved === 'rtl' ? 'right' : 'left';
      return resolved;
    }

    function renderTimestamp(container, value, rowDirection) {
      container.innerHTML = '';
      container.dir = rowDirection;
      container.classList.toggle('align-right', rowDirection === 'rtl');
      container.classList.toggle('align-left', rowDirection === 'ltr');
      container.style.textAlign = rowDirection === 'rtl' ? 'right' : 'left';

      const prefix = document.createElement('span');
      prefix.className = 'timestamp-prefix';
      prefix.textContent = t('updatedPrefix') + ' ';
      prefix.dir = rowDirection;

      const valueSpan = document.createElement('span');
      valueSpan.className = 'timestamp-value';

      if (value) {
        valueSpan.classList.add('timestamp-value-ltr');
        valueSpan.textContent = formatTimestamp(value);
      } else {
        valueSpan.textContent = t('neverUpdated');
        valueSpan.dir = rowDirection;
      }

      container.appendChild(prefix);
      container.appendChild(valueSpan);
    }

    function ensureSelection() {
      if (!state.data.checklists.length) {
        const demo = createChecklist(t('firstChecklistName'), state.uiLanguage === 'he' ? 'לקנות חלב\nלקבוע פגישה\nלשלוח חשבונית\nCall supplier' : 'Buy milk\nSchedule meeting\nSend invoice\nCall supplier');
        state.data.checklists = [demo];
      }

      if (!getSelectedChecklist()) {
        state.selectedChecklistId = state.data.checklists[0].id;
      }
    }

    function renderUiText() {
      document.documentElement.lang = state.uiLanguage;
      document.documentElement.dir = state.uiLanguage === 'he' ? 'rtl' : 'ltr';
      uiLanguage.innerHTML = '';
      [
        { value: 'he', label: state.uiLanguage === 'he' ? 'עברית' : 'Hebrew' },
        { value: 'en', label: state.uiLanguage === 'he' ? 'אנגלית' : 'English' }
      ].forEach(optionData => {
        const option = document.createElement('option');
        option.value = optionData.value;
        option.textContent = optionData.label;
        uiLanguage.appendChild(option);
      });
      uiLanguage.value = state.uiLanguage;

      document.getElementById('appTitle').textContent = t('appTitle');
      document.getElementById('appSubtitle').textContent = t('appSubtitle');
      document.getElementById('checklistsTitle').textContent = t('checklistsTitle');
      document.getElementById('checklistsNote').textContent = t('checklistsNote');
      document.getElementById('actionsTitle').textContent = t('actionsTitle');
      document.getElementById('actionsNote').textContent = t('actionsNote');
      document.getElementById('editorPanelTitle').textContent = t('editorTitle');
      document.getElementById('editorPanelNote').textContent = t('editorNote');
      document.getElementById('previewPanelNote').textContent = t('previewPanelNote');
      document.getElementById('settingsTitle').textContent = t('settingsTitle');
      document.getElementById('settingsNote').textContent = t('settingsNote');
      document.getElementById('ownerLabel').textContent = t('owner');
      document.getElementById('repoLabel').textContent = t('repository');
      document.getElementById('branchLabel').textContent = t('branch');
      document.getElementById('filePathLabel').textContent = t('filePath');
      document.getElementById('tokenLabel').textContent = t('token');
      document.getElementById('tokenNote').textContent = t('tokenNote');
      newChecklistBtn.textContent = t('newChecklist');
      renameChecklistBtn.textContent = t('renameChecklist');
      deleteChecklistBtn.textContent = t('deleteChecklist');
      clearChecksBtn.textContent = t('clearChecks');
      reloadBtn.textContent = t('reloadFromGithub');
      openSettingsBtn.textContent = t('githubSettings');
      saveBtn.textContent = t('saveChanges');
      closeSettingsBtn.textContent = t('close');
      saveSettingsBtn.textContent = t('saveSettings');
      toggleEditorBtn.textContent = state.showEditor ? t('toggleEditorHide') : t('toggleEditorShow');
      editor.placeholder = t('editorPlaceholder');
      ownerInput.placeholder = state.uiLanguage === 'he' ? 'למשל JonBiryon' : 'e.g. JonBiryon';
      repoInput.placeholder = state.uiLanguage === 'he' ? 'למשל Checklister' : 'e.g. Checklister';
      branchInput.placeholder = 'main';
      filePathInput.placeholder = 'data/checklists.json';
      tokenInput.placeholder = state.uiLanguage === 'he' ? 'Fine-grained personal access token' : 'Fine-grained personal access token';

      appDirection.innerHTML = '';
      [
        { value: 'auto', label: t('directionAuto') },
        { value: 'rtl', label: t('directionRtl') },
        { value: 'ltr', label: t('directionLtr') }
      ].forEach(optionData => {
        const option = document.createElement('option');
        option.value = optionData.value;
        option.textContent = optionData.label;
        appDirection.appendChild(option);
      });
      appDirection.value = state.direction;
    }

    function renderLayout() {
      if (state.showEditor) {
        editorPanel.classList.remove('hidden');
        mainStack.classList.remove('editor-hidden');
        toggleEditorBtn.textContent = t('toggleEditorHide');
      } else {
        editorPanel.classList.add('hidden');
        mainStack.classList.add('editor-hidden');
        toggleEditorBtn.textContent = t('toggleEditorShow');
      }
    }

    function renderChecklistList() {
      checklistList.innerHTML = '';

      state.data.checklists.forEach(checklist => {
        const button = document.createElement('button');
        button.className = 'checklist-button' + (checklist.id === state.selectedChecklistId ? ' active' : '');
        button.type = 'button';
        button.addEventListener('click', () => {
          state.selectedChecklistId = checklist.id;
          persistLocal();
          renderAll();
        });

        const name = document.createElement('div');
        name.className = 'checklist-name';
        name.textContent = checklist.name;
        applyTextDirection(name, checklist.name);
        applyTextDirection(button, checklist.name);

        const meta = document.createElement('div');
        meta.className = 'checklist-meta';
        meta.textContent = checklist.items.length + ' ' + t('itemCountSuffix');
        applyTextDirection(meta, checklist.name);

        button.appendChild(name);
        button.appendChild(meta);
        checklistList.appendChild(button);
      });

      if (!state.data.checklists.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = t('emptyChecklistList');
        checklistList.appendChild(empty);
      }
    }

    function renderStats() {
      const checklist = getSelectedChecklist();
      if (!checklist) {
        editorStats.textContent = '';
        previewStats.textContent = '';
        previewTitle.textContent = t('previewFallbackTitle');
        return;
      }

      const total = checklist.items.length;
      const done = checklist.items.filter(item => item.done).length;
      const open = total - done;

      previewTitle.textContent = checklist.name;
      applyTextDirection(previewTitle, checklist.name);
      editorStats.textContent = total + ' ' + t('lines');
      previewStats.textContent = total + ' ' + t('itemsLabel') + ' • ' + done + ' ' + t('doneLabel') + ' • ' + open + ' ' + t('openLabel');
    }

    function renderEditor() {
      const checklist = getSelectedChecklist();
      editor.value = checklist ? checklist.rawText : '';
      const editorMode = checklist ? getItemDirection(editor.value) : (state.uiLanguage === 'he' ? 'rtl' : 'ltr');
      applyDirection(editor, editorMode);
      editor.classList.toggle('align-right', editorMode === 'rtl');
      editor.classList.toggle('align-left', editorMode === 'ltr');
      editor.style.textAlign = editorMode === 'rtl' ? 'right' : 'left';
    }

    function renderPreview() {
      preview.innerHTML = '';
      applyDirection(preview, state.uiLanguage === 'he' ? 'rtl' : 'ltr');

      const checklist = getSelectedChecklist();
      if (!checklist || !checklist.items.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = checklist ? t('emptyChecklistItems') : t('notSelected');
        preview.appendChild(empty);
        return;
      }

      checklist.items.forEach(item => {
        const row = document.createElement('label');
        row.className = 'item' + (item.done ? ' done' : '');
        const rowDirection = getItemDirection(item.text);
        applyDirection(row, rowDirection);

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'checkbox';
        checkbox.checked = item.done;
        checkbox.addEventListener('change', () => {
          item.done = checkbox.checked;
          item.updatedAt = new Date().toISOString();
          checklist.updatedAt = new Date().toISOString();
          persistLocal();
          renderPreview();
          renderStats();
        });

        const text = document.createElement('div');
        text.className = 'item-text';
        text.textContent = item.text;
        applyTextDirection(text, item.text, rowDirection);

        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        renderTimestamp(timestamp, item.updatedAt, rowDirection);

        row.appendChild(checkbox);
        row.appendChild(text);
        row.appendChild(timestamp);
        preview.appendChild(row);
      });
    }

    function renderSaveInfo() {
      if (state.data.lastSavedAt) {
        saveInfo.textContent = t('lastSavedPrefix') + ' ' + formatTimestamp(state.data.lastSavedAt);
      } else {
        saveInfo.textContent = t('neverSaved');
      }
    }

    function renderAll() {
      renderUiText();
      renderLayout();
      renderChecklistList();
      renderEditor();
      renderPreview();
      renderStats();
      renderSaveInfo();
    }

    function persistLocal() {
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(state));
    }

    function loadLocal() {
      try {
        const saved = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY));
        if (!saved) {
          return;
        }

        state.direction = ['auto', 'rtl', 'ltr'].includes(saved.direction) ? saved.direction : state.direction;
        state.showEditor = typeof saved.showEditor === 'boolean' ? saved.showEditor : state.showEditor;
        state.uiLanguage = ['he', 'en'].includes(saved.uiLanguage) ? saved.uiLanguage : state.uiLanguage;
        state.selectedChecklistId = saved.selectedChecklistId || state.selectedChecklistId;

        if (saved.github && typeof saved.github === 'object') {
          state.github.owner = saved.github.owner || state.github.owner;
          state.github.repo = saved.github.repo || state.github.repo;
          state.github.branch = saved.github.branch || state.github.branch;
          state.github.filePath = saved.github.filePath || state.github.filePath;
          state.github.token = saved.github.token || '';
        }

        if (saved.data && Array.isArray(saved.data.checklists)) {
          state.data = saved.data;
        }
      } catch {
      }
    }

    function syncEditorToSelectedChecklist() {
      const checklist = getSelectedChecklist();
      if (!checklist) {
        return;
      }

      checklist.rawText = editor.value;
      checklist.items = parseItems(checklist.rawText, checklist.items);
      checklist.updatedAt = new Date().toISOString();
      persistLocal();
      renderEditor();
      renderPreview();
      renderStats();
      renderChecklistList();
    }

    function openSettings() {
      ownerInput.value = state.github.owner;
      repoInput.value = state.github.repo;
      branchInput.value = state.github.branch;
      filePathInput.value = state.github.filePath;
      tokenInput.value = state.github.token;
      settingsDialog.classList.add('show');
    }

    function closeSettings() {
      settingsDialog.classList.remove('show');
    }

    function saveSettings() {
      state.github.owner = ownerInput.value.trim();
      state.github.repo = repoInput.value.trim();
      state.github.branch = branchInput.value.trim() || 'main';
      state.github.filePath = filePathInput.value.trim() || 'data/checklists.json';
      state.github.token = tokenInput.value.trim();
      persistLocal();
      closeSettings();
      setStatus(t('settingsSaved'));
    }

    function encodeBase64Unicode(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function decodeBase64Unicode(str) {
      return decodeURIComponent(escape(atob(str)));
    }

    async function githubRequest(url, options = {}) {
      const headers = {
        Accept: 'application/vnd.github+json',
        ...options.headers
      };

      if (state.github.token) {
        headers.Authorization = 'Bearer ' + state.github.token;
      }

      const response = await fetch(url, {
        ...options,
        headers
      });

      return response;
    }

    async function loadFromGitHub() {
      if (!state.github.owner || !state.github.repo || !state.github.branch || !state.github.filePath) {
        setStatus(t('missingSettings'));
        openSettings();
        return;
      }

      setStatus(t('loading'));
      const url = 'https://api.github.com/repos/' + encodeURIComponent(state.github.owner) + '/' + encodeURIComponent(state.github.repo) + '/contents/' + state.github.filePath.split('/').map(encodeURIComponent).join('/') + '?ref=' + encodeURIComponent(state.github.branch);

      try {
        const response = await githubRequest(url);

        if (response.status === 404) {
          repoFileSha = null;
          setStatus(t('fileMissing'));
          return;
        }

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || 'GitHub load failed');
        }

        const payload = await response.json();
        repoFileSha = payload.sha || null;
        const decoded = decodeBase64Unicode(payload.content.replace(/\n/g, ''));
        const parsed = JSON.parse(decoded);

        if (!parsed || !Array.isArray(parsed.checklists)) {
          throw new Error('Invalid checklist JSON structure');
        }

        state.data = {
          version: parsed.version || 1,
          lastSavedAt: parsed.lastSavedAt || null,
          checklists: parsed.checklists
        };

        ensureSelection();
        persistLocal();
        renderAll();
        setStatus(t('loaded'));
      } catch (error) {
        setStatus(t('loadError'));
        console.error(error);
      }
    }

    async function saveToGitHub() {
      if (!state.github.token) {
        setStatus(t('missingToken'));
        openSettings();
        return;
      }

      if (!state.github.owner || !state.github.repo || !state.github.branch || !state.github.filePath) {
        setStatus(t('missingSettings'));
        openSettings();
        return;
      }

      setStatus(t('saving'));
      saveBtn.disabled = true;

      const payloadObject = {
        version: 1,
        lastSavedAt: new Date().toISOString(),
        checklists: state.data.checklists
      };

      const content = JSON.stringify(payloadObject, null, 2);
      const url = 'https://api.github.com/repos/' + encodeURIComponent(state.github.owner) + '/' + encodeURIComponent(state.github.repo) + '/contents/' + state.github.filePath.split('/').map(encodeURIComponent).join('/');

      try {
        if (repoFileSha === null) {
          await loadFromGitHub();
        }

        const requestBody = {
          message: 'Update checklists.json',
          content: encodeBase64Unicode(content),
          branch: state.github.branch
        };

        if (repoFileSha) {
          requestBody.sha = repoFileSha;
        }

        const response = await githubRequest(url, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || 'GitHub save failed');
        }

        const result = await response.json();
        repoFileSha = result.content && result.content.sha ? result.content.sha : repoFileSha;
        state.data.lastSavedAt = payloadObject.lastSavedAt;
        persistLocal();
        renderSaveInfo();
        setStatus(t('saved'));
      } catch (error) {
        setStatus(t('saveError'));
        console.error(error);
      } finally {
        saveBtn.disabled = false;
      }
    }

    function createNewChecklist() {
      const name = prompt(t('newChecklistPrompt'), t('newChecklistDefault'));
      if (!name) {
        return;
      }

      const checklist = createChecklist(name.trim(), '');
      state.data.checklists.push(checklist);
      state.selectedChecklistId = checklist.id;
      persistLocal();
      renderAll();
      setStatus(t('createdChecklist'));
    }

    function renameSelectedChecklist() {
      const checklist = getSelectedChecklist();
      if (!checklist) {
        return;
      }

      const name = prompt(t('renameChecklistPrompt'), checklist.name);
      if (!name) {
        return;
      }

      checklist.name = name.trim();
      checklist.updatedAt = new Date().toISOString();
      persistLocal();
      renderAll();
      setStatus(t('renamedChecklist'));
    }

    function deleteSelectedChecklist() {
      const checklist = getSelectedChecklist();
      if (!checklist) {
        return;
      }

      if (!confirm(t('deleteChecklistConfirm', { name: checklist.name }))) {
        return;
      }

      state.data.checklists = state.data.checklists.filter(item => item.id !== checklist.id);
      ensureSelection();
      persistLocal();
      renderAll();
      setStatus(t('deletedChecklist'));
    }

    function clearChecks() {
      const checklist = getSelectedChecklist();
      if (!checklist) {
        return;
      }

      const now = new Date().toISOString();
      checklist.items = checklist.items.map(item => ({
        ...item,
        done: false,
        updatedAt: item.done ? now : item.updatedAt
      }));
      checklist.updatedAt = now;
      persistLocal();
      renderAll();
      setStatus(t('clearedChecks'));
    }

    toggleEditorBtn.addEventListener('click', () => {
      state.showEditor = !state.showEditor;
      persistLocal();
      renderLayout();
    });

    appDirection.addEventListener('change', () => {
      state.direction = appDirection.value;
      persistLocal();
      renderAll();
    });

    uiLanguage.addEventListener('change', () => {
      state.uiLanguage = uiLanguage.value;
      persistLocal();
      renderAll();
      setStatus(t('ready'));
    });

    editor.addEventListener('input', syncEditorToSelectedChecklist);
    openSettingsBtn.addEventListener('click', openSettings);
    closeSettingsBtn.addEventListener('click', closeSettings);
    saveSettingsBtn.addEventListener('click', saveSettings);
    saveBtn.addEventListener('click', saveToGitHub);
    reloadBtn.addEventListener('click', loadFromGitHub);
    newChecklistBtn.addEventListener('click', createNewChecklist);
    renameChecklistBtn.addEventListener('click', renameSelectedChecklist);
    deleteChecklistBtn.addEventListener('click', deleteSelectedChecklist);
    clearChecksBtn.addEventListener('click', clearChecks);

    settingsDialog.addEventListener('click', event => {
      if (event.target === settingsDialog) {
        closeSettings();
      }
    });

    function init() {
      loadLocal();
      ensureSelection();
      renderAll();
      setStatus(t('ready'));
    }

    init();
  </script>
</body>
</html>
